<script>
    let kamus = [];
    
    // Mengambil data (Pastikan nama file data.json tanpa titik)
    fetch('data.json') 
        .then(response => response.json())
        .then(data => kamus = data)
        .catch(err => console.error("Gagal memuat data:", err));

    function cari() {
        let input = document.getElementById('inputLatin').value.toLowerCase().trim();
        let hasilDisplay = document.getElementById('hasil');
        
        // Mencari di kolom 'latin' ATAU 'indonesia'
        let ketemu = kamus.find(item => 
            item.latin.toLowerCase() === input || 
            item.indonesia.toLowerCase() === input
        );

        if (ketemu) {
            hasilDisplay.innerHTML = <strong>${ketemu.indonesia}</strong> (${ketemu.part_of_speech});
        } else {
            hasilDisplay.innerHTML = "Kata tidak ditemukan";
        }
    }
</script>
